events {}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream app {
        server app1:8080;
        server app2:8080;
    }
    server {
        listen 8080;

        # REST API → app instances (round-robin)
        location /jobs {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # STOMP WebSocket upgrade → app instances (one persistent connection, no affinity needed)
        location /ws {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Angular static app with SPA fallback
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
