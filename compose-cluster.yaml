services:
  valkey:
    image: 'valkey/valkey:9.1.0'
  pulsar:
    image: 'apachepulsar/pulsar:4.2.2'
    command: [ 'bin/pulsar', 'standalone' ]
    healthcheck:
      test: [ 'CMD', 'bin/pulsar-admin', 'brokers', 'healthcheck' ]
      interval: 2s
      timeout: 15s
      retries: 10
      start_period: 10s
  app1:
    image: 'spring-boot-redis-pub-sub-playground:0.0.1-SNAPSHOT'
    environment:
      SPRING_DATA_REDIS_HOST: valkey
      SPRING_PULSAR_CLIENT_SERVICE_URL: pulsar://pulsar:6650
    depends_on:
      valkey:
        condition: service_started
      pulsar:
        condition: service_healthy
  app2:
    image: 'spring-boot-redis-pub-sub-playground:0.0.1-SNAPSHOT'
    environment:
      SPRING_DATA_REDIS_HOST: valkey
      SPRING_PULSAR_CLIENT_SERVICE_URL: pulsar://pulsar:6650
    depends_on:
      valkey:
        condition: service_started
      pulsar:
        condition: service_healthy
  nginx:
    image: 'nginx:1.27'
    volumes:
      - './nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './frontend/dist/frontend/browser:/usr/share/nginx/html:ro'
    ports:
      - '8080:8080'
    depends_on: [ app1, app2 ]
